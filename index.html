<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planner MF</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --rose: #E8B4BC;
  --rose-light: #F5DDE1;
  --rose-pale: #FDF0F2;
  --rose-deep: #C4848F;
  --rose-dark: #9A5C65;
  --ink: #3A2C2E;
  --ink-mid: #7A5E62;
  --ink-soft: #B09498;
  --cream: #FBF7F7;
  --white: #FFFFFF;
  --border: #EDD8DB;
  --ciclo-bg: #EAF2EC;
  --ciclo-text: #3D6B4A;
  --personal-bg: #EEE9F5;
  --personal-text: #5A4878;
  --flore-bg: #F2EBE3;
  --flore-text: #6B4F2E;
  --alta-bg: #F9EBED;
  --media-bg: #F7F0E6;
  --media: #C4A87A;
  --baja-bg: #EAF2EC;
  --baja: #8FAE9A;
  --ingreso: #3D6B4A;
  --ingreso-bg: #EAF2EC;
  --gasto-bg: #F9EBED;
  --gasto: #9A5C65;
  --warn: #C4A87A;
  --warn-bg: #F7F0E6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; padding-bottom: 70px; }

.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1.25rem 1.25rem 0.75rem; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 680px; margin: 0 auto; }
.header-top { display: flex; align-items: baseline; justify-content: space-between; }
.logo { font-size: 18px; font-weight: 500; color: var(--ink); }
.logo span { color: var(--rose-deep); }
.header-date { font-size: 12px; color: var(--ink-soft); }
.stats-row { display: flex; gap: 1.5rem; margin-top: 0.75rem; }
.stat { display: flex; align-items: baseline; gap: 5px; }
.stat-n { font-size: 20px; font-weight: 300; color: var(--rose-deep); }
.stat-l { font-size: 11px; color: var(--ink-soft); }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border); display: flex; z-index: 200; }
.nav-btn { flex: 1; padding: 12px 0 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--ink-soft); background: none; border: none; cursor: pointer; }
.nav-btn.on { color: var(--rose-deep); font-weight: 500; border-top: 2px solid var(--rose-deep); }

.main { max-width: 680px; margin: 0 auto; padding: 1.25rem 1.25rem 1rem; }
.section { display: none; }
.section.on { display: block; }

.filter-bar { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.fb { font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--white); color: var(--ink-mid); cursor: pointer; }
.fb.on { background: var(--rose-light); border-color: var(--rose); color: var(--rose-dark); font-weight: 500; }

.task-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 8px; }
.task-card:hover { border-color: var(--rose); }
.task-card.done { opacity: 0.5; }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.chk { width: 18px; height: 18px; border: 1.5px solid var(--rose); border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; }
.chk.on { background: var(--rose); color: white; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; color: var(--ink); word-break: break-word; }
.task-title.done { text-decoration: line-through; color: var(--ink-soft); }
.task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.cat-tag { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
.cat-montova { background: var(--rose-light); color: var(--rose-dark); }
.cat-ciclo { background: var(--ciclo-bg); color: var(--ciclo-text); }
.cat-personal { background: var(--personal-bg); color: var(--personal-text); }
.cat-flore { background: var(--flore-bg); color: var(--flore-text); }
.pri-tag { font-size: 11px; padding: 2px 9px; border-radius: 10px; }
.pri-alta { background: var(--alta-bg); color: var(--rose-dark); }
.pri-media { background: var(--media-bg); color: var(--media); }
.pri-baja { background: var(--baja-bg); color: var(--baja); }
.deadline-tag { font-size: 11px; color: var(--ink-soft); }
.deadline-tag.vencida { color: #b94040; }
.deadline-tag.pronto { color: var(--media); }
.asignado-tag { font-size: 11px; color: var(--ink-soft); }
.tog-btn { font-size: 12px; color: var(--ink-soft); cursor: pointer; margin-top: 7px; display: inline-block; border: none; background: none; font-family: 'DM Sans', sans-serif; padding: 0; }
.tog-btn:hover { color: var(--rose-dark); }
.del-btn { font-size: 16px; color: var(--ink-soft); cursor: pointer; background: none; border: none; padding: 0 0 0 6px; line-height: 1; flex-shrink: 0; }
.del-btn:hover { color: var(--rose-dark); }
.edit-btn { font-size: 13px; color: var(--ink-soft); cursor: pointer; background: none; border: none; padding: 0 0 0 4px; line-height: 1; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
.edit-btn:hover { color: var(--rose-dark); }
.notes-box { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
.notes-box textarea { width: 100%; font-size: 13px; color: var(--ink); background: var(--rose-pale); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; resize: vertical; min-height: 72px; font-family: 'DM Sans', sans-serif; outline: none; line-height: 1.6; }
.notes-box textarea:focus { border-color: var(--rose); }
.notes-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
.save-btn { font-size: 12px; padding: 5px 16px; border: 1px solid var(--rose); border-radius: 20px; background: transparent; color: var(--rose-dark); cursor: pointer; font-family: 'DM Sans', sans-serif; }
.save-btn:hover { background: var(--rose-light); }

.gastos-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.gtab { flex: 1; min-width: 0; padding: 8px 6px; font-size: 11px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 10px; background: var(--white); color: var(--ink-mid); cursor: pointer; text-align: center; white-space: nowrap; }
.gtab.on { background: var(--rose-light); border-color: var(--rose); color: var(--rose-dark); font-weight: 500; }

.ciclo-banner { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.ciclo-label { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.03em; }
.ciclo-valor { font-size: 24px; font-weight: 300; color: var(--rose-deep); margin: 4px 0; }
.ciclo-fechas { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
.pago-alerta { margin-top: 10px; padding: 8px 12px; background: var(--alta-bg); border-radius: 8px; font-size: 13px; color: var(--rose-dark); font-weight: 500; }

.cuenta-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.ctab { flex: 1; padding: 7px; font-size: 12px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: 8px; background: var(--white); color: var(--ink-mid); cursor: pointer; text-align: center; }
.ctab.on { background: var(--rose-light); border-color: var(--rose); color: var(--rose-dark); font-weight: 500; }

.resumen-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.resumen-card { flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
.resumen-n { font-size: 18px; font-weight: 300; }
.resumen-l { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.resumen-n.ing { color: var(--ingreso); }
.resumen-n.gas { color: var(--gasto); }

.mov-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 0.875rem 1.25rem; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
.mov-card:hover { border-color: var(--rose); }
.mov-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mov-dot.ing { background: var(--ingreso); }
.mov-dot.gas { background: var(--gasto); }
.mov-dot.warn { background: var(--warn); }
.mov-body { flex: 1; min-width: 0; }
.mov-desc { font-size: 14px; font-weight: 500; color: var(--ink); }
.mov-meta { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.mov-reembolso { font-size: 11px; color: var(--flore-text); background: var(--flore-bg); padding: 1px 7px; border-radius: 8px; display: inline-block; margin-top: 3px; }
.mov-valor { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.mov-valor.ing { color: var(--ingreso); }
.mov-valor.gas { color: var(--gasto); }
.mov-valor.warn { color: var(--warn); }

/* ── DIFERIDAS ── */
.dif-resumen { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.dif-total { font-size: 26px; font-weight: 300; color: var(--rose-deep); margin: 4px 0 2px; }
.dif-sub { font-size: 12px; color: var(--ink-soft); }
.dif-alerta { margin-top: 10px; padding: 8px 12px; background: var(--warn-bg); border-radius: 8px; font-size: 13px; color: var(--warn); font-weight: 500; }

.dif-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 8px; }
.dif-card:hover { border-color: var(--rose); }
.dif-card.urgente { border-left: 3px solid var(--rose-deep); }
.dif-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.dif-nombre { font-size: 14px; font-weight: 500; color: var(--ink); }
.dif-fecha { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.dif-valores { text-align: right; flex-shrink: 0; }
.dif-cuota { font-size: 16px; font-weight: 500; color: var(--rose-deep); }
.dif-cuota-label { font-size: 10px; color: var(--ink-soft); }
.dif-progress { margin-top: 10px; }
.dif-progress-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 4px; }
.dif-progress-fill { height: 100%; background: var(--rose-deep); border-radius: 4px; transition: width 0.3s; }
.dif-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
.dif-saldo { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
.dif-saldo strong { color: var(--rose-dark); }
.badge-prox { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--alta-bg); color: var(--rose-dark); font-weight: 500; margin-top: 4px; }
.badge-ok { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; background: var(--baja-bg); color: var(--baja); font-weight: 500; margin-top: 4px; }

.section-label { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.04em; margin-bottom: 8px; margin-top: 4px; }

.nestor-total { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; text-align: center; }
.nestor-n { font-size: 32px; font-weight: 300; color: var(--rose-deep); margin: 8px 0; }
.nestor-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 1rem; }
.btn-nestor { width: 100%; padding: 11px; background: var(--rose-deep); color: white; border: none; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-nestor:hover { opacity: 0.88; }

.fab { position: fixed; bottom: 4.5rem; right: 1.25rem; width: 48px; height: 48px; border-radius: 50%; background: var(--rose-deep); color: white; font-size: 24px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(196,132,143,0.35); z-index: 150; }
.fab:hover { transform: scale(1.07); }

.overlay { display: none; position: fixed; inset: 0; background: rgba(58,44,46,0.35); z-index: 300; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 17px; font-weight: 500; color: var(--ink); margin-bottom: 1.25rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.04em; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink); background: var(--rose-pale); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--rose); }
.field textarea { resize: vertical; min-height: 60px; line-height: 1.6; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
.btn-primary { flex: 1; padding: 11px; background: var(--rose-deep); color: white; border: none; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.btn-primary:hover { opacity: 0.88; }
.btn-secondary { padding: 11px 20px; background: transparent; color: var(--ink-mid); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

.empty { text-align: center; padding: 2.5rem 1rem; color: var(--ink-soft); font-size: 14px; }
.toast { position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; font-size: 13px; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; z-index: 500; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
@media (max-width: 480px) { .field-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo">Planner <span>MARIA FERNANDA</span></div>
      <div class="header-date" id="hdate"></div>
    </div>
    <div class="stats-row" id="planner-stats">
      <div class="stat"><span class="stat-n" id="sTotal">0</span><span class="stat-l">total</span></div>
      <div class="stat"><span class="stat-n" id="sPend">0</span><span class="stat-l">pendientes</span></div>
      <div class="stat"><span class="stat-n" id="sDone">0</span><span class="stat-l">listas</span></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="section on" id="sec-planner">
    <div class="filter-bar">
      <button class="fb on" data-f="todas">Todas</button>
      <button class="fb" data-f="pendientes">Pendientes</button>
      <button class="fb" data-f="montova">Montova</button>
      <button class="fb" data-f="ciclo">Ciclo</button>
      <button class="fb" data-f="personal">Personal</button>
      <button class="fb" data-f="flore">Flore&amp;Serena</button>
      <button class="fb" data-f="alta">Alta prioridad</button>
    </div>
    <div id="task-list"></div>
  </div>

  <div class="section" id="sec-gastos">
    <div class="gastos-tabs">
      <button class="gtab on" data-g="tarjeta">Visa Platinum</button>
      <button class="gtab" data-g="cuentas">Confiar &amp; Bancolombia</button>
      <button class="gtab" data-g="nestor">Nestor</button>
    </div>
    <div id="g-tarjeta">
      <div id="tarjeta-banners"></div>
      <button class="save-btn" id="btn-abono" style="margin-bottom:1rem;display:block">+ Registrar abono</button>
      <div id="tarjeta-list"></div>
    </div>
    <div id="g-cuentas" style="display:none">
      <div class="cuenta-tabs">
        <button class="ctab on" data-c="Confiar">Confiar</button>
        <button class="ctab" data-c="Bancolombia">Bancolombia</button>
      </div>
      <div class="resumen-row" id="resumen-row"></div>
      <div id="cuentas-list"></div>
    </div>
    <div id="g-nestor" style="display:none">
      <div id="nestor-content"></div>
    </div>
  </div>
</div>

<button class="fab" id="fab">+</button>

<nav class="bottom-nav">
  <button class="nav-btn on" data-nav="planner">Planner</button>
  <button class="nav-btn" data-nav="gastos">Gastos</button>
</nav>

<!-- Modal nueva tarea -->
<div class="overlay" id="overlay-tarea">
  <div class="modal">
    <div class="modal-title">Nueva tarea</div>
    <div class="field"><label>TAREA</label><input id="f-titulo" placeholder="Que hay que hacer?" /></div>
    <div class="field-row">
      <div class="field"><label>CATEGORIA</label>
        <select id="f-cat">
          <option value="Montova">Montova</option>
          <option value="Ciclo">Ciclo</option>
          <option value="Personal">Personal</option>
          <option value="Flore&amp;Serena">Flore&amp;Serena</option>
        </select>
      </div>
      <div class="field"><label>PRIORIDAD</label>
        <select id="f-pri">
          <option value="Alta">Alta</option>
          <option value="Media" selected>Media</option>
          <option value="Baja">Baja</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>DEADLINE</label><input type="date" id="f-deadline" /></div>
      <div class="field"><label>ASIGNADO POR</label><input id="f-asignado" placeholder="Nestor, Juan Pedro..." /></div>
    </div>
    <div class="field"><label>NOTAS (opcional)</label><textarea id="f-notas" placeholder="Contexto, detalles..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-tarea">Cancelar</button>
      <button class="btn-primary" id="btn-save-tarea">Guardar tarea</button>
    </div>
  </div>
</div>

<!-- Modal editar tarea -->
<div class="overlay" id="overlay-edit">
  <div class="modal">
    <div class="modal-title">Editar tarea</div>
    <div class="field"><label>TAREA</label><input id="e-titulo" /></div>
    <div class="field"><label>DEADLINE</label><input type="date" id="e-deadline" /></div>
    <input type="hidden" id="e-id" />
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-edit">Cancelar</button>
      <button class="btn-primary" id="btn-save-edit">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- Modal gasto tarjeta -->
<div class="overlay" id="overlay-tarjeta">
  <div class="modal">
    <div class="modal-title" id="modal-tarjeta-title">Nueva compra</div>
    <div class="field"><label>DESCRIPCIÓN</label><input id="t-desc" placeholder="¿En qué?" /></div>
    <div class="field-row">
      <div class="field"><label>VALOR TOTAL ($)</label><input type="number" id="t-valor" placeholder="0" /></div>
      <div class="field"><label>FECHA DE COMPRA</label><input type="date" id="t-fecha" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>CUOTAS (ej: 7/12)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="t-cuota-actual" placeholder="7" min="1" style="width:80px" />
          <span style="color:var(--ink-soft);font-size:13px">de</span>
          <input type="number" id="t-cuotas" placeholder="12" min="1" style="flex:1" />
        </div>
      </div>
      <div class="field"><label>VALOR DE LA CUOTA ($)</label><input type="number" id="t-cuota-valor" placeholder="0" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>FECHA PRÓXIMA CUOTA</label><input type="date" id="t-fecha-cuota" /></div>
      <div class="field"><label>INTERÉS ANUAL (%)</label><input type="number" id="t-interes" placeholder="28.75" value="28.75" step="0.01" /></div>
    </div>
    <div class="field" id="t-cuota-preview" style="background:var(--rose-pale);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--ink-mid);display:none"></div>
    <div class="field"><label>REEMBOLSO NÉSTOR</label>
      <select id="t-reembolso">
        <option value="No">No</option>
        <option value="Si">Sí, pendiente</option>
        <option value="Recibido">Sí, ya recibido</option>
      </select>
    </div>
    <input type="hidden" id="t-edit-id" value="" />
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-tarjeta">Cancelar</button>
      <button class="btn-primary" id="btn-save-tarjeta">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal abono tarjeta -->
<div class="overlay" id="overlay-abono">
  <div class="modal">
    <div class="modal-title">Registrar abono</div>
    <div class="field-row">
      <div class="field"><label>VALOR ($)</label><input type="number" id="a-valor" placeholder="0" /></div>
      <div class="field"><label>FECHA</label><input type="date" id="a-fecha" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-cancel-abono">Cancelar</button>
      <button class="btn-primary" id="btn-save-abono">Guardar abono</button>
    </div>
  </div>
</div>

<!-- Modal movimiento cuenta -->
<div class="overlay" id="overlay-cuenta">
  <div class="modal">
    <div class="modal-title">Nuevo movimiento</div>
    <div class="field"><label>DESCRIPCION</label><input id="c-desc" placeholder="Que es?" /></div>
    <div class="field-row">

<script>
var WS = 'https://script.google.com/macros/s/AKfycbyagXxarrH6332Nz1jafIGS3CJKT3eMCBvQqTdyNC6eesn_QPsFjgqIdJYAdMv2piDEUw/exec';
var tasks = [], tarjeta = [], cuentas = [], abonos = [], abonosNestor = [];
var taskFilter = 'todas', expanded = {};
var gastosTab = 'tarjeta', cuentaTab = 'Confiar';
var activeNav = 'planner';

window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('hdate').textContent = new Date().toLocaleDateString('es-CO', {weekday:'long', day:'numeric', month:'long'});
  initNav();
  initFilters();
  initTareaModal();
  initEditModal();
  initTarjetaModal();
  initAbonoModal();

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function fmt(n) {
  return '$' + Math.round(Number(n)).toLocaleString('es-CO', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function sendToServer(body) {
  fetch(WS, {method:'POST', body:JSON.stringify(body)}).catch(function(){});
}

function cicloKey(isoDate) {
  if (!isoDate) return '';
  var parts = String(isoDate).split('-');
  if (parts.length < 3) return '';
  var day = parseInt(parts[2]);
  var month = parseInt(parts[1]);
  var year = parseInt(parts[0]);
  if (day >= 15) return year + '-' + String(month).padStart(2,'0');
  if (month === 1) return (year-1) + '-12';
  return year + '-' + String(month-1).padStart(2,'0');
}

function getDateISO(val) {
  if (!val) return '';
  var s = String(val).trim();
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.substring(0,10);
  if (s.includes('/')) {
    var p = s.split('/');
    if (p.length === 3 && p[2].length === 4) return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  }
  return s.substring(0,10);
}

function deadlineLabel(dl) {
  if (!dl) return null;
  var parts = String(dl).split('-');
  if (parts.length !== 3) return null;
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  if (isNaN(d.getTime())) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  var diff = Math.round((d - today) / 86400000);
  var label = d.toLocaleDateString('es-CO', {day:'2-digit', month:'short'});
  if (diff < 0) return {text: label + ' · vencida', cls: 'vencida'};
  if (diff <= 3) return {text: label + ' · pronto', cls: 'pronto'};
  return {text: label, cls: ''};
}

function initFilters() {

function initCuentaTabs() {

function initFab() {

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

function initOverlay(id) {

// PLANNER
function fetchTasks() {
  fetch(WS + '?action=getTasks').then(function(r){ return r.json(); }).then(function(data) {
    tasks = Array.isArray(data) ? data : [];
    renderTasks();
  }).catch(function(){ tasks = []; renderTasks(); });
}

function addTask(d) {
  var tempId = Date.now();
  var today = new Date().toLocaleDateString('es-CO', {day:'2-digit', month:'2-digit', year:'numeric'});
  tasks.unshift({ID:tempId, Titulo:d.titulo, Categoria:d.categoria, Prioridad:d.prioridad, Deadline:d.deadline, 'Asignado por':d.asignadoPor, Notas:d.notas||'', Estado:'pendiente', 'Fecha creacion':today});
  renderTasks();
  showToast('Tarea guardada');
  sendToServer({action:'addTask', titulo:d.titulo, categoria:d.categoria, prioridad:d.prioridad, deadline:d.deadline, asignadoPor:d.asignadoPor, notas:d.notas||''});
  setTimeout(fetchTasks, 5000);
}

function editTask(id, titulo, deadline) {
  var t = tasks.find(function(x){ return String(x.ID)===String(id); });
  if (t) { t.Titulo=titulo; t.Deadline=deadline; }
  renderTasks();
  showToast('Actualizada');
  sendToServer({action:'updateTask', id:id, field:'editTarea', titulo:titulo, deadline:deadline});
}

function updateNotes(id, notas) {
  var t = tasks.find(function(x){ return String(x.ID)===String(id); });
  if (t) t.Notas = notas;
  showToast('Avances guardados');
  sendToServer({action:'updateTask', id:id, field:'notasOnly', value:notas});
}

function toggleDone(id, current) {
  var newVal = current === 'lista' ? 'pendiente' : 'lista';
  var t = tasks.find(function(x){ return String(x.ID)===String(id); });
  if (t) t.Estado = newVal;
  renderTasks();
  sendToServer({action:'updateTask', id:id, field:'estado', value:newVal});
}

function deleteTask(id) {
  if (!confirm('Eliminar esta tarea?')) return;
  tasks = tasks.filter(function(x){ return String(x.ID)!==String(id); });
  renderTasks();
  sendToServer({action:'deleteTask', id:id});
}

function renderTasks() {
  var total = tasks.length;
  var done = tasks.filter(function(t){ return (t.Estado||'').toLowerCase()==='lista'; }).length;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sPend').textContent = total - done;
  document.getElementById('sDone').textContent = done;

  var vis = tasks;
  if (taskFilter==='pendientes') vis = tasks.filter(function(t){ return (t.Estado||'').toLowerCase()!=='lista'; });
  else if (taskFilter==='montova')  vis = tasks.filter(function(t){ return (t.Categoria||'').toLowerCase()==='montova'; });
  else if (taskFilter==='ciclo')    vis = tasks.filter(function(t){ return (t.Categoria||'').toLowerCase()==='ciclo'; });
  else if (taskFilter==='personal') vis = tasks.filter(function(t){ return (t.Categoria||'').toLowerCase()==='personal'; });
  else if (taskFilter==='flore')    vis = tasks.filter(function(t){ return (t.Categoria||'').toLowerCase().indexOf('flore')>=0; });
  else if (taskFilter==='alta')     vis = tasks.filter(function(t){ return (t.Prioridad||'').toLowerCase()==='alta'; });

  var tl = document.getElementById('task-list');
  if (!vis.length) { tl.innerHTML = '<div class="empty">No hay tareas aqui todavia</div>'; return; }

  var html = '';
  vis.forEach(function(t) {
    var id = t.ID;
    var isDone = (t.Estado||'').toLowerCase()==='lista';
    var catRaw = (t.Categoria||'personal').toLowerCase();
    var cat = catRaw.indexOf('flore')>=0 ? 'flore' : catRaw;
    var pri = (t.Prioridad||'media').toLowerCase();
    var dl = deadlineLabel(t.Deadline);
    var e = expanded[id];
    var hasNotes = t.Notas && t.Notas.trim().length > 0;
    var tituloEsc = (t.Titulo||'').replace(/"/g,'&quot;');
    var deadlineEsc = t.Deadline||'';

    html += '<div class="task-card' + (isDone?' done':'') + '">';
    html += '<div class="card-top">';
    html += '<div class="chk' + (isDone?' on':'') + '" data-id="' + id + '" data-estado="' + (t.Estado||'pendiente') + '">' + (isDone?'&check;':'') + '</div>';
    html += '<div class="task-body">';
    html += '<div class="task-title' + (isDone?' done':'') + '">' + (t.Titulo||'') + '</div>';
    html += '<div class="task-meta">';
    html += '<span class="cat-tag cat-' + cat + '">' + (t.Categoria||'') + '</span>';
    html += '<span class="pri-tag pri-' + pri + '">' + (t.Prioridad||'') + '</span>';
    if (dl) html += '<span class="deadline-tag ' + dl.cls + '">' + dl.text + '</span>';
    if (t['Asignado por']) html += '<span class="asignado-tag">· ' + t['Asignado por'] + '</span>';
    if (hasNotes && !e) html += '<span style="font-size:11px;color:var(--ink-soft)">· tiene avances</span>';
    html += '</div>';
    html += '<button class="tog-btn" data-id="' + id + '">' + (e?'cerrar':'avances / notas') + '</button>';
    html += '</div>';
    html += '<button class="edit-btn" data-edit="' + id + '" data-titulo="' + tituloEsc + '" data-deadline="' + deadlineEsc + '">&#9998;</button>';
    html += '<button class="del-btn" data-del="' + id + '">&#215;</button>';
    html += '</div>';
    if (e) {
      html += '<div class="notes-box">';
      html += '<textarea id="nt-' + id + '" placeholder="Escribe tus avances o notas aqui...">' + (t.Notas||'') + '</textarea>';
      html += '<div class="notes-actions"><button class="save-btn" data-saveid="' + id + '">Guardar avances</button></div>';
      html += '</div>';
    }
    html += '</div>';
  });

  tl.innerHTML = html;

  tl.querySelectorAll('.chk').forEach(function(el) {
    el.addEventListener('click', function(){ toggleDone(el.dataset.id, el.dataset.estado); });
  });
  tl.querySelectorAll('.tog-btn').forEach(function(el) {
    el.addEventListener('click', function(){ expanded[el.dataset.id]=!expanded[el.dataset.id]; renderTasks(); });
  });
  tl.querySelectorAll('[data-edit]').forEach(function(el) {
    el.addEventListener('click', function(){
      document.getElementById('e-id').value = el.dataset.edit;
      document.getElementById('e-titulo').value = el.dataset.titulo;
      document.getElementById('e-deadline').value = el.dataset.deadline;
      document.getElementById('overlay-edit').classList.add('open');
    });
  });
  tl.querySelectorAll('[data-del]').forEach(function(el) {
    el.addEventListener('click', function(){ deleteTask(el.dataset.del); });
  });
  tl.querySelectorAll('[data-saveid]').forEach(function(el) {
    el.addEventListener('click', function(){
      var ta = document.getElementById('nt-'+el.dataset.saveid);
      if (ta) updateNotes(el.dataset.saveid, ta.value);
    });
  });
}

// TARJETA — lógica basada en fecha de próxima cuota
function calcSaldoPendiente(valor, cuotas, interes, cuotaActual) {
  if (cuotas <= 1) return 0;
  var cuotasRestantes = cuotas - cuotaActual;
  if (cuotasRestantes <= 0) return 0;
  var im = interes / 100 / 12;
  var cuotaVal = cuotas <= 1 ? valor : (im === 0 ? valor/cuotas : valor * im * Math.pow(1+im,cuotas) / (Math.pow(1+im,cuotas)-1));
  if (im === 0) return cuotaVal * cuotasRestantes;
  // Saldo = cuota * (1 - (1+im)^-n) / im
  return cuotaVal * (1 - Math.pow(1+im, -cuotasRestantes)) / im;
}

function addGastoTarjeta(d) {
  var tempId = Date.now();
  var valor = Number(d.valor);
  tarjeta.push({
    ID: tempId,
    Fecha: d.fecha,
    Descripcion: d.descripcion,
    Valor: valor,
    Cuotas: d.cuotas || 1,
    CuotaActual: d.cuotaActual || 1,
    CuotaValor: d.cuotaValor || valor,
    FechaCuota: d.fechaCuota || d.fecha,
    Interes: d.interes || 0,

  });
  renderTarjeta();
  showToast(valor < 0 ? 'Devolución registrada' : 'Compra guardada');
  sendToServer({
    action: 'addTarjeta',
    fecha: d.fecha,
    descripcion: d.descripcion,
    valor: valor,
    cuotas: d.cuotas || 1,
    cuotaActual: d.cuotaActual || 1,
    cuotaValor: d.cuotaValor || valor,
    fechaCuota: d.fechaCuota || d.fecha,
    interes: d.interes || 0,
    ciclo: cicloKey(d.fechaCuota || d.fecha),
    reembolso: d.reembolso || 'No'
  });

}

function editGastoTarjeta(id, d) {
  var t = tarjeta.find(function(x){ return String(x.ID)===String(id); });
  if (!t) return;
  t.Descripcion = d.descripcion;
  t.Valor = Number(d.valor);
  t.Cuotas = d.cuotas || 1;
  t.CuotaActual = d.cuotaActual || 1;
  t.CuotaValor = d.cuotaValor || d.valor;
  t.FechaCuota = d.fechaCuota || d.fecha;
  t.Interes = d.interes || 0;
  t.Ciclo = cicloKey(d.fechaCuota || d.fecha);
  t.Reembolso_Nestor = d.reembolso || 'No';
  renderTarjeta();
  showToast('Compra actualizada');
  sendToServer({
    action: 'updateTarjeta', id: id,
    descripcion: d.descripcion, valor: Number(d.valor),
    cuotas: d.cuotas, cuotaActual: d.cuotaActual,
    cuotaValor: d.cuotaValor, fechaCuota: d.fechaCuota,
    interes: d.interes, reembolso: d.reembolso
  });
}

function deleteGastoTarjeta(id) {

  renderTarjeta();
  sendToServer({action:'deleteTarjeta', id:id});

function addAbono(d) {

  showToast('Abono registrado');
  sendToServer({action:'addAbono', fecha:d.fecha, valor:d.valor});

}

function getCicloCompra(t) {
  // Usar FechaCuota si existe, si no usar Fecha
  var f = t.FechaCuota || t.fechaCuota || t.Fecha || t.fecha || '';
  return cicloKey(getDateISO(String(f)));
}

function renderTarjeta() {
  var hoy = new Date();
  var d = hoy.getDate();
  var inicioAct, finAct, inicioAnt, finAnt;
  if (d >= 15) {
    inicioAct = new Date(hoy.getFullYear(), hoy.getMonth(), 15);
    finAct    = new Date(hoy.getFullYear(), hoy.getMonth()+1, 14);
  } else {
    inicioAct = new Date(hoy.getFullYear(), hoy.getMonth()-1, 15);
    finAct    = new Date(hoy.getFullYear(), hoy.getMonth(), 14);
  }
  inicioAnt = new Date(inicioAct.getFullYear(), inicioAct.getMonth()-1, 15);
  finAnt    = new Date(inicioAct.getFullYear(), inicioAct.getMonth(), 14);

  var ckAct = cicloKey(inicioAct.toISOString().split('T')[0]);
  var ckAnt = cicloKey(inicioAnt.toISOString().split('T')[0]);

  var mesPagoAct = new Date(finAct.getFullYear(), finAct.getMonth()+1, 1).toLocaleDateString('es-CO',{month:'long'});
  var mesPagoAnt = new Date(finAnt.getFullYear(), finAnt.getMonth()+1, 1).toLocaleDateString('es-CO',{month:'long'});
  var mesPagoAntFecha = new Date(finAnt.getFullYear(), finAnt.getMonth()+1, 3);
  var anteriorPendiente = hoy <= mesPagoAntFecha;

  var comprasAct = tarjeta.filter(function(t){ return Number(t.Valor||0) >= 0 && getCicloCompra(t)===ckAct; });
  var devAct     = tarjeta.filter(function(t){ return Number(t.Valor||0) < 0  && getCicloCompra(t)===ckAct; });
  var comprasAnt = tarjeta.filter(function(t){ return Number(t.Valor||0) >= 0 && getCicloCompra(t)===ckAnt; });
  var devAnt     = tarjeta.filter(function(t){ return Number(t.Valor||0) < 0  && getCicloCompra(t)===ckAnt; });

  function cuotaDelCiclo(t) {
    return Number(t.CuotaValor || t.cuotaValor || t.Valor || 0);
  }

  var totalCuotasAct = comprasAct.reduce(function(s,t){ return s + cuotaDelCiclo(t); }, 0);
  var totalDevAct    = devAct.reduce(function(s,t){ return s + Math.abs(Number(t.Valor||0)); }, 0);
  var totalCuotasAnt = comprasAnt.reduce(function(s,t){ return s + cuotaDelCiclo(t); }, 0);
  var totalDevAnt    = devAnt.reduce(function(s,t){ return s + Math.abs(Number(t.Valor||0)); }, 0);

  function abonadoEnRango(desde, hasta) {
    return abonos.filter(function(a){
      var f = getDateISO(a.Fecha||a.fecha||'');
      return f >= desde && f <= hasta;
    }).reduce(function(s,a){ return s+Number(a.Valor||a.valor||0); }, 0);
  }

  var inicioActStr = inicioAct.toISOString().split('T')[0];
  var finActStr    = finAct.toISOString().split('T')[0];
  var inicioAntStr = inicioAnt.toISOString().split('T')[0];
  var finAntStr    = finAnt.toISOString().split('T')[0];

  var abonadoAct = abonadoEnRango(inicioActStr, finActStr) + totalDevAct;
  var abonadoAnt = abonadoEnRango(inicioAntStr, finAntStr) + totalDevAnt;
  var pendienteAct = Math.max(0, totalCuotasAct - abonadoAct);
  var pendienteAnt = Math.max(0, totalCuotasAnt - abonadoAnt);

  function bannerHTML(label, total, abonado, pendiente, desde, hasta, mesPago, borderColor) {
    var style = borderColor ? 'style="border-color:' + borderColor + '"' : '';
    var h = '<div class="ciclo-banner" ' + style + '>';
    h += '<div class="ciclo-label">' + label + '</div>';
    h += '<div class="ciclo-valor">' + fmt(total) + '</div>';
    h += '<div class="ciclo-fechas">' + desde + ' &mdash; ' + hasta + '</div>';
    if (abonado > 0) {
      h += '<div style="font-size:12px;color:var(--ink-soft);margin-top:6px">Abonado/dev: ' + fmt(abonado) + ' &nbsp;|&nbsp; <strong style="color:var(--rose-dark)">Pendiente: ' + fmt(pendiente) + '</strong></div>';
    }
    h += '<div class="pago-alerta">Pagar antes del 3 de ' + mesPago + '</div>';
    h += '</div>';
    return h;
  }

  function cardsHTML(compras, devs) {
    var items = compras.map(function(t){ return {tipo:'compra', fecha:getDateISO(String(t.FechaCuota||t.fechaCuota||t.Fecha||'')), data:t}; })
      .concat(devs.map(function(t){ return {tipo:'dev', fecha:getDateISO(String(t.Fecha||'')), data:t}; }));
    items.sort(function(a,b){ return b.fecha.localeCompare(a.fecha); });
    if (!items.length) return '<div class="empty">Sin movimientos en este ciclo</div>';

    return items.map(function(item) {
      var t = item.data;
      var id = t.ID;
      var esDev = item.tipo === 'dev';
      var cuotas = parseInt(t.Cuotas||1);
      var cuotaActual = parseInt(t.CuotaActual||1);
      var cuotaVal = Number(t.CuotaValor||t.cuotaValor||t.Valor||0);
      var interes = parseFloat(t.Interes||0);
      var valor = Number(t.Valor||0);
      var cuotasRestantes = cuotas - cuotaActual;
      var saldo = calcSaldoPendiente(Math.abs(valor), cuotas, interes, cuotaActual);
      var r = String(t.Reembolso_Nestor||'');
      var reemb = (r && r !== 'No') ? r : '';
      var esDiferida = cuotas > 1;

      var h = '<div class="mov-card" style="' + (esDiferida ? 'border-left:3px solid var(--rose-deep)' : '') + '">';
      h += '<div class="mov-dot ' + (esDev ? 'ing' : (esDiferida ? 'warn' : 'gas')) + '"></div>';
      h += '<div class="mov-body">';
      h += '<div class="mov-desc">' + (t.Descripcion||'') + '</div>';
      h += '<div class="mov-meta">' + getDateISO(String(t.Fecha||''));
      if (esDiferida) h += ' · cuota ' + cuotaActual + '/' + cuotas + (interes > 0 ? ' · ' + interes + '% anual' : ' · sin interés');
      h += '</div>';
      if (!esDev && esDiferida) {
        h += '<div style="font-size:11px;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap">';
        h += '<span style="color:var(--ink-soft)">Cuota: <strong style="color:var(--rose-dark)">' + fmt(cuotaVal) + '</strong></span>';
        if (cuotasRestantes > 0) h += '<span style="color:var(--ink-soft)">Saldo: <strong style="color:var(--rose-dark)">' + fmt(saldo) + '</strong></span>';
        if (cuotasRestantes > 0) h += '<span style="color:var(--ink-soft)">Faltan: <strong>' + cuotasRestantes + '</strong></span>';
        h += '</div>';
      }
      if (esDev) h += '<div style="font-size:11px;color:var(--ciclo-text);margin-top:2px">Devolución / abono</div>';
      if (reemb) h += '<div class="mov-reembolso">Reembolso Néstor · ' + reemb + '</div>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
      h += '<div class="mov-valor ' + (esDev ? 'ing' : (esDiferida ? 'warn' : 'gas')) + '">' + (esDev ? '-' : '') + fmt(Math.abs(esDiferida ? cuotaVal : valor)) + '</div>';
      h += '<button class="edit-btn" data-edittarjeta="' + id + '" title="Editar">&#9998;</button>';
      h += '<button class="del-btn" data-deltarjeta="' + id + '">&#215;</button>';
      h += '</div>';
      h += '</div>';
      return h;
    }).join('');
  }

  var fmtDate = function(dd) { return dd.toLocaleDateString('es-CO',{day:'numeric',month:'short'}); };
  var bannersHTML = bannerHTML('CICLO ACTUAL', totalCuotasAct, abonadoAct, pendienteAct, fmtDate(inicioAct), fmtDate(finAct), mesPagoAct, '');
  if (anteriorPendiente) {
    bannersHTML += bannerHTML('CICLO ANTERIOR · PENDIENTE DE PAGO', totalCuotasAnt, abonadoAnt, pendienteAnt, fmtDate(inicioAnt), fmtDate(finAnt), mesPagoAnt, '#f0c8cc');
  }
  document.getElementById('tarjeta-banners').innerHTML = bannersHTML;

  var listHTML = cardsHTML(comprasAct, devAct);
  if (anteriorPendiente) {
    listHTML += '<div class="section-label" style="margin-top:14px">CICLO ANTERIOR</div>' + cardsHTML(comprasAnt, devAnt);
  }
  document.getElementById('tarjeta-list').innerHTML = listHTML;

  document.getElementById('tarjeta-list').querySelectorAll('[data-deltarjeta]').forEach(function(el){
    el.addEventListener('click', function(){ deleteGastoTarjeta(el.dataset.deltarjeta); });
  });
  document.getElementById('tarjeta-list').querySelectorAll('[data-edittarjeta]').forEach(function(el){
    el.addEventListener('click', function(){
      var t = tarjeta.find(function(x){ return String(x.ID)===el.dataset.edittarjeta; });
      if (!t) return;
      document.getElementById('modal-tarjeta-title').textContent = 'Editar compra';
      document.getElementById('t-desc').value = t.Descripcion||'';
      document.getElementById('t-valor').value = Math.abs(Number(t.Valor||0));
      document.getElementById('t-fecha').value = getDateISO(String(t.Fecha||''));
      document.getElementById('t-cuotas').value = t.Cuotas||1;
      document.getElementById('t-cuota-actual').value = t.CuotaActual||1;
      document.getElementById('t-cuota-valor').value = t.CuotaValor||t.cuotaValor||'';
      document.getElementById('t-fecha-cuota').value = getDateISO(String(t.FechaCuota||t.fechaCuota||t.Fecha||''));
      document.getElementById('t-interes').value = t.Interes||28.75;
      document.getElementById('t-reembolso').value = t.Reembolso_Nestor||'No';
      document.getElementById('t-edit-id').value = el.dataset.edittarjeta;
      updateCuotaPreview();
      document.getElementById('overlay-tarjeta').classList.add('open');
    });
  });
}

function updateCuotaPreview() {
  var valor = parseFloat(document.getElementById('t-valor').value)||0;
  var cuotas = parseInt(document.getElementById('t-cuotas').value)||1;
  var cuotaActual = parseInt(document.getElementById('t-cuota-actual').value)||1;
  var cuotaVal = parseFloat(document.getElementById('t-cuota-valor').value)||0;
  var interes = parseFloat(document.getElementById('t-interes').value)||0;
  var preview = document.getElementById('t-cuota-preview');
  if (valor <= 0 || cuotas <= 1 || cuotaVal <= 0) { preview.style.display='none'; return; }
  var restantes = cuotas - cuotaActual;
  var saldo = calcSaldoPendiente(valor, cuotas, interes, cuotaActual);
  preview.style.display = 'block';
  preview.innerHTML = '💳 Cuota ' + cuotaActual + '/' + cuotas + ' &nbsp;|&nbsp; Faltan: <strong>' + restantes + ' cuotas</strong> &nbsp;|&nbsp; Saldo pendiente: <strong>' + fmt(saldo) + '</strong>';
}

function initTarjetaModal() {
  document.getElementById('btn-cancel-tarjeta').addEventListener('click', function(){
    closeOverlay('overlay-tarjeta');
    document.getElementById('t-edit-id').value='';
    document.getElementById('modal-tarjeta-title').textContent='Nueva compra';
  });
  initOverlay('overlay-tarjeta');

  ['t-valor','t-cuotas','t-cuota-actual','t-cuota-valor','t-interes'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', updateCuotaPreview);
  });

  document.getElementById('btn-save-tarjeta').addEventListener('click', function(){
    var desc       = document.getElementById('t-desc').value.trim();
    var valor      = document.getElementById('t-valor').value;
    var fecha      = document.getElementById('t-fecha').value;
    var cuotas     = parseInt(document.getElementById('t-cuotas').value)||1;
    var cuotaActual = parseInt(document.getElementById('t-cuota-actual').value)||1;
    var cuotaValor = document.getElementById('t-cuota-valor').value || valor;
    var fechaCuota = document.getElementById('t-fecha-cuota').value || fecha;
    var interes    = document.getElementById('t-interes').value || '28.75';
    var reembolso  = document.getElementById('t-reembolso').value;
    var editId     = document.getElementById('t-edit-id').value;

    if (!desc || !valor) { showToast('Completa descripción y valor'); return; }
    if (!fecha) { fecha = new Date().toISOString().split('T')[0]; }
    if (!fechaCuota) { fechaCuota = fecha; }

    // Si valor negativo → devolución, usar fecha como fechaCuota
    var esDevolucion = Number(valor) < 0;
    if (esDevolucion) { cuotas = 1; cuotaActual = 1; cuotaValor = valor; fechaCuota = fecha; }

    var d = {
      descripcion: desc, valor: Number(valor), fecha: fecha,
      cuotas: cuotas, cuotaActual: cuotaActual,
      cuotaValor: Number(cuotaValor), fechaCuota: fechaCuota,
      interes: interes, reembolso: reembolso
    };
    if (editId) { editGastoTarjeta(editId, d); }
    else        { addGastoTarjeta(d); }

    closeOverlay('overlay-tarjeta');
    ['t-desc','t-valor','t-cuota-valor','t-fecha-cuota'].forEach(function(id){ document.getElementById(id).value=''; });
    document.getElementById('t-cuotas').value = '1';
    document.getElementById('t-cuota-actual').value = '1';
    document.getElementById('t-edit-id').value='';
    document.getElementById('modal-tarjeta-title').textContent='Nueva compra';
    document.getElementById('t-cuota-preview').style.display='none';
  });
}

function initAbonoModal() {
  document.getElementById('btn-abono').addEventListener('click', function(){
    document.getElementById('a-fecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('overlay-abono').classList.add('open');
  });
  document.getElementById('btn-cancel-abono').addEventListener('click', function(){ closeOverlay('overlay-abono'); });
  initOverlay('overlay-abono');
  document.getElementById('btn-save-abono').addEventListener('click', function(){
    var valor = document.getElementById('a-valor').value;
    var fecha = document.getElementById('a-fecha').value;
    if (!valor || !fecha) { showToast('Completa todos los campos'); return; }
    addAbono({valor:Number(valor), fecha:fecha});
    closeOverlay('overlay-abono');
    document.getElementById('a-valor').value='';
  });
}



// CUENTAS
function fetchCuentas() {
  fetch(WS + '?action=getCuentas').then(function(r){ return r.json(); }).then(function(data) {
    cuentas = Array.isArray(data) ? data : [];
    renderCuentas();
  }).catch(function(){ cuentas = []; });
}

function addMovCuenta(d) {
  cuentas.push({ID:Date.now(), Fecha:d.fecha, Descripcion:d.descripcion, Valor:d.valor, Tipo:d.tipo, Cuenta:d.cuenta, Reembolso_Nestor:d.reembolso||'No'});
  renderCuentas();
  showToast('Movimiento guardado');
  sendToServer({action:'addCuenta', fecha:d.fecha, descripcion:d.descripcion, valor:d.valor, tipo:d.tipo, cuenta:d.cuenta, reembolso:d.reembolso||'No'});
  setTimeout(fetchCuentas, 5000);
}

function deleteMovCuenta(id) {
  if (!confirm('Eliminar este movimiento?')) return;
  cuentas = cuentas.filter(function(c){ return String(c.ID)!==String(id); });
  renderCuentas();
  sendToServer({action:'deleteCuenta', id:id});
}

function renderCuentas() {
  var filtradas = cuentas.filter(function(c){ return (c.Cuenta||c.cuenta||'')===cuentaTab; });
  var ingresos = filtradas.filter(function(c){ return (c.Tipo||c.tipo||'')==='Ingreso'; }).reduce(function(s,c){ return s+Number(c.Valor||0); }, 0);
  var gastos   = filtradas.filter(function(c){ return (c.Tipo||c.tipo||'')==='Gasto'; }).reduce(function(s,c){ return s+Number(c.Valor||0); }, 0);
  var saldo    = ingresos - gastos;

  document.getElementById('resumen-row').innerHTML =
    '<div class="resumen-card"><div class="resumen-n ing">' + fmt(ingresos) + '</div><div class="resumen-l">ingresos</div></div>' +
    '<div class="resumen-card"><div class="resumen-n gas">' + fmt(gastos) + '</div><div class="resumen-l">gastos</div></div>' +
    '<div class="resumen-card"><div class="resumen-n" style="color:' + (saldo>=0?'var(--ingreso)':'var(--gasto)') + '">' + fmt(saldo) + '</div><div class="resumen-l">saldo</div></div>';

  var sorted = filtradas.slice().sort(function(a,b){ return String(b.Fecha).localeCompare(String(a.Fecha)); });
  var cl = document.getElementById('cuentas-list');
  if (!sorted.length) { cl.innerHTML = '<div class="empty">Sin movimientos</div>'; return; }

  cl.innerHTML = sorted.map(function(c) {
    var isIng = (c.Tipo||c.tipo||'')==='Ingreso';
    var r = String(c.Reembolso_Nestor||'');
    var reemb = (r && r !== 'No') ? r : '';
    var h = '<div class="mov-card">';
    h += '<div class="mov-dot ' + (isIng?'ing':'gas') + '"></div>';
    h += '<div class="mov-body">';
    h += '<div class="mov-desc">' + (c.Descripcion||'') + '</div>';
    h += '<div class="mov-meta">' + getDateISO(c.Fecha||'') + '</div>';
    if (reemb) h += '<div class="mov-reembolso">Reembolso Nestor · ' + reemb + '</div>';
    h += '</div>';
    h += '<div class="mov-valor ' + (isIng?'ing':'gas') + '">' + (isIng?'+':'−') + fmt(c.Valor) + '</div>';
    h += '<button class="del-btn" data-delcuenta="' + c.ID + '">&#215;</button>';
    h += '</div>';
    return h;
  }).join('');

  cl.querySelectorAll('[data-delcuenta]').forEach(function(el){
    el.addEventListener('click', function(){ deleteMovCuenta(el.dataset.delcuenta); });
  });
}

function initCuentaModal() {
  document.getElementById('btn-cancel-cuenta').addEventListener('click', function(){ closeOverlay('overlay-cuenta'); });
  initOverlay('overlay-cuenta');
  document.getElementById('btn-save-cuenta').addEventListener('click', function(){
    var desc = document.getElementById('c-desc').value.trim();
    var valor = document.getElementById('c-valor').value;
    var fecha = document.getElementById('c-fecha').value;
    if (!desc || !valor || !fecha) { showToast('Completa todos los campos'); return; }
    addMovCuenta({descripcion:desc, valor:Number(valor), fecha:fecha, tipo:document.getElementById('c-tipo').value, cuenta:document.getElementById('c-cuenta').value, reembolso:document.getElementById('c-reembolso').value});
    closeOverlay('overlay-cuenta');
    document.getElementById('c-desc').value='';
    document.getElementById('c-valor').value='';
  });
}

// NESTOR
function renderNestor() {
  var tarjetaPend = tarjeta.filter(function(t){
    var r = String(t.Reembolso_Nestor||'').toLowerCase();
    return r === 'si' || r === 'si, pendiente';
  });
  var cuentasPend = cuentas.filter(function(c){
    var r = String(c.Reembolso_Nestor||'').toLowerCase();
    return r === 'si' || r === 'si, pendiente';
  });

  var totalTarjeta = tarjetaPend.reduce(function(s,t){ return s+Number(t.Valor||0); }, 0);
  var totalCuentas = cuentasPend.reduce(function(s,c){ return s+Number(c.Valor||0); }, 0);
  var totalBruto = totalTarjeta + totalCuentas;
  var totalAbonado = abonosNestor.reduce(function(s,a){ return s+Number(a.Valor||a.valor||0); }, 0);
  var totalGeneral = Math.max(0, totalBruto - totalAbonado);

  var html = '<div class="nestor-total">';
  html += '<div class="ciclo-label">TOTAL QUE TE DEBE NESTOR</div>';
  html += '<div class="nestor-n">' + fmt(totalGeneral) + '</div>';
  if (totalTarjeta > 0 || totalCuentas > 0) {
    html += '<div class="nestor-sub">Tarjeta: ' + fmt(totalTarjeta) + ' &nbsp;|&nbsp; Cuentas: ' + fmt(totalCuentas) + '</div>';
    if (totalAbonado > 0) {
      html += '<div class="nestor-sub" style="color:var(--ciclo-text)">Abonado: ' + fmt(totalAbonado) + '</div>';
    }
  }
  if (totalGeneral > 0) {
    html += '<div style="display:flex;gap:8px;margin-top:1rem">';
    html += '<input type="number" id="nestor-abono-valor" placeholder="Valor abono" style="flex:1;font-size:14px;font-family:DM Sans,sans-serif;background:var(--rose-pale);border:1px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;color:var(--ink)" />';
    html += '<button class="btn-nestor" id="btn-abono-nestor" style="flex:0 0 auto;width:auto;padding:11px 20px">Registrar abono</button>';
    html += '</div>';
    html += '<button id="btn-nestor-todo" style="width:100%;margin-top:8px;padding:9px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:DM Sans,sans-serif;color:var(--ink-mid);cursor:pointer">Marcar todo como recibido</button>';
  }
  html += '</div>';

  if (totalGeneral === 0) {
    html += '<div class="empty">Nestor no te debe nada ahorita</div>';
  } else {
    if (tarjetaPend.length) {
      html += '<div class="section-label">TARJETA</div>';
      tarjetaPend.forEach(function(t){
        html += '<div class="mov-card"><div class="mov-dot gas"></div><div class="mov-body"><div class="mov-desc">' + (t.Descripcion||'') + '</div><div class="mov-meta">Visa · ' + getDateISO(t.Fecha||'') + '</div></div><div class="mov-valor gas">' + fmt(t.Valor||0) + '</div></div>';
      });
    }
    if (cuentasPend.length) {
      html += '<div class="section-label" style="margin-top:12px">CUENTAS</div>';
      cuentasPend.forEach(function(c){
        html += '<div class="mov-card"><div class="mov-dot gas"></div><div class="mov-body"><div class="mov-desc">' + (c.Descripcion||'') + '</div><div class="mov-meta">' + (c.Cuenta||'') + ' · ' + getDateISO(c.Fecha||'') + '</div></div><div class="mov-valor gas">' + fmt(c.Valor||0) + '</div></div>';
      });
    }
  }

  document.getElementById('nestor-content').innerHTML = html;

  var btnAbono = document.getElementById('btn-abono-nestor');
  if (btnAbono) {
    btnAbono.addEventListener('click', function(){
      var valorInput = document.getElementById('nestor-abono-valor');
      var valor = parseFloat(valorInput ? valorInput.value : 0);
      if (!valor || valor <= 0) { showToast('Ingresa el valor del abono'); return; }
      var fecha = new Date().toISOString().split('T')[0];
      abonosNestor.push({ID: Date.now(), Fecha: fecha, Valor: valor});
      if (valorInput) valorInput.value = '';
      showToast('Abono de Néstor registrado');
      sendToServer({action: 'addAbonoNestor', fecha: fecha, valor: valor});
      renderNestor();
    });
  }

  var btnTodo = document.getElementById('btn-nestor-todo');
  if (btnTodo) {
    btnTodo.addEventListener('click', function(){
      if (!confirm('Marcar todo como recibido (' + fmt(totalGeneral) + ')?')) return;
      tarjeta.forEach(function(t){
        var r = String(t.Reembolso_Nestor||'').toLowerCase();
        if (r === 'si' || r === 'si, pendiente') {
          t.Reembolso_Nestor = 'Recibido';
          sendToServer({action:'updateReembolsoTarjeta', id:t.ID, value:'Recibido'});
        }
      });
      cuentas.forEach(function(c){
        var r = String(c.Reembolso_Nestor||'').toLowerCase();
        if (r === 'si' || r === 'si, pendiente') {
          c.Reembolso_Nestor = 'Recibido';
          sendToServer({action:'updateReembolsoCuenta', id:c.ID, value:'Recibido'});
        }
      });
      showToast('Todo marcado como recibido');
      renderNestor();
    });
  }
}

function renderGastos() {
  if (gastosTab === 'tarjeta')   renderTarjeta();
  else if (gastosTab === 'cuentas')   renderCuentas();
  else if (gastosTab === 'nestor')    renderNestor();
}
</script>
</body>
</html>
